kind = "mobile"
previewPath = "/"
title = "AI Finance Tracker"
version = "1.0.0"
id = "artifacts/finance-tracker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18616

[services.development]
run = "pnpm --filter @workspace/finance-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finance-tracker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/finance-tracker", "run", "serve" ]

[services.env]
PORT = "18616"
BASE_PATH = "/"
